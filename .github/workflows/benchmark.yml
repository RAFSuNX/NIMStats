name: Benchmark NIM + OpenRouter Models

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # every hour

jobs:
  # ── NVIDIA NIM ──────────────────────────────────────────────────────────────
  test_nim_group1:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Test NIM group 1
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          MODEL_GROUP: group1
        run: python3 scripts/test_models.py
      - uses: actions/upload-artifact@v4
        with:
          name: results-group1
          path: scripts/results.json
          retention-days: 1

  test_nim_group2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Test NIM group 2
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          MODEL_GROUP: group2
        run: python3 scripts/test_models.py
      - uses: actions/upload-artifact@v4
        with:
          name: results-group2
          path: scripts/results.json
          retention-days: 1

  # ── OpenRouter free models ──────────────────────────────────────────────────
  test_openrouter_group1:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Test OpenRouter free models (first half)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MODEL_GROUP: group1
        run: python3 scripts/test_openrouter.py
      - uses: actions/upload-artifact@v4
        with:
          name: results-openrouter-group1
          path: scripts/results.json
          retention-days: 1

  test_openrouter_group2:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Test OpenRouter free models (second half)
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MODEL_GROUP: group2
        run: python3 scripts/test_openrouter.py
      - uses: actions/upload-artifact@v4
        with:
          name: results-openrouter-group2
          path: scripts/results.json
          retention-days: 1

  # ── Merge & commit ──────────────────────────────────────────────────────────
  merge_and_update:
    needs: [test_nim_group1, test_nim_group2, test_openrouter_group1, test_openrouter_group2]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: scripts/

      - name: Merge results and update history
        run: |
          mv scripts/results-group1/results.json scripts/results-group1.json || true
          mv scripts/results-group2/results.json scripts/results-group2.json || true
          mv scripts/results-openrouter-group1/results.json scripts/results-openrouter-group1.json || true
          mv scripts/results-openrouter-group2/results.json scripts/results-openrouter-group2.json || true
          python3 scripts/merge_results.py

      - name: Push history.db to data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Save DB before switching branches
          cp history.db /tmp/history.db

          # Switch to data branch (orphan if it doesn't exist yet)
          if git fetch origin data-branch 2>/dev/null; then
            git checkout data-branch
          else
            git checkout --orphan data-branch
            git rm -rf . --quiet
          fi

          cp /tmp/history.db history.db

          git add history.db
          git commit --allow-empty -m "data: benchmark results"

          # Force push - single commit forever, no log spam
          git push origin data-branch --force

      - name: Trigger Cloudflare Pages deploy
        if: ${{ env.CF_DEPLOY_HOOK != '' }}
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: curl -sS -X POST "$CF_DEPLOY_HOOK"
