name: Benchmark NIM + OpenRouter Models

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'  # every hour

# To add more OR groups: change or-groups matrix and OR_GROUP_COUNT below
env:
  OR_GROUP_COUNT: "2"

jobs:
  # ── NVIDIA NIM (hardcoded 2 groups, list is curated) ────────────────────────
  test_nim:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        group: [1, 2]
    steps:
      - uses: actions/checkout@v4
      - name: Test NIM group ${{ matrix.group }}
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
          MODEL_GROUP: group${{ matrix.group }}
        run: python3 scripts/test_models.py
      - uses: actions/upload-artifact@v4
        with:
          name: results-group${{ matrix.group }}
          path: scripts/results.json
          retention-days: 1

  # ── OpenRouter free models (scale by changing matrix + OR_GROUP_COUNT) ───────
  test_openrouter:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        group: [1, 2]   # add 3, 4... here if OR free models grow
    steps:
      - uses: actions/checkout@v4
      - name: Test OpenRouter free models group ${{ matrix.group }}
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MODEL_GROUP: group${{ matrix.group }}
          GROUP_COUNT: ${{ env.OR_GROUP_COUNT }}
        run: python3 scripts/test_openrouter.py
      - uses: actions/upload-artifact@v4
        with:
          name: results-openrouter-group${{ matrix.group }}
          path: scripts/results.json
          retention-days: 1

  # ── Merge & commit ──────────────────────────────────────────────────────────
  merge_and_update:
    needs: [test_nim, test_openrouter]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: scripts/

      - name: Fetch existing history.db from gh-pages
        run: git fetch origin gh-pages 2>/dev/null && git show origin/gh-pages:history.db > history.db 2>/dev/null || true

      - name: Merge results and update history
        run: |
          for dir in scripts/results-*/; do
            name=$(basename "$dir")
            mv "$dir/results.json" "scripts/${name}.json" || true
          done
          python3 scripts/merge_results.py

      - name: Push history.db to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp history.db /tmp/history.db

          if git fetch origin gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . --quiet
          fi

          cp /tmp/history.db history.db
          git add history.db
          git commit --allow-empty -m "data: benchmark results"
          git push origin gh-pages --force

      - name: Trigger Cloudflare Pages deploy
        if: ${{ env.CF_DEPLOY_HOOK != '' }}
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: curl -sS -X POST "$CF_DEPLOY_HOOK"
